# Trigger deployment - Supabase secrets updated
name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📦 Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 🔨 Install Dependencies
        run: |
          npm ci || npm install --force --legacy-peer-deps

      - name: 🏗️ Build Project
        run: |
          echo "Generating .env file for build..."
          # Use single quotes to escape special characters in secrets
          echo "VITE_SUPABASE_URL='${{ secrets.VITE_SUPABASE_URL }}'" > .env
          echo "VITE_SUPABASE_ANON_KEY='${{ secrets.VITE_SUPABASE_ANON_KEY }}'" >> .env
          echo "VITE_MAPBOX_TOKEN='${{ secrets.VITE_MAPBOX_TOKEN }}'" >> .env
          
          echo "Verifying .env structure (keys only)..."
          cut -d'=' -f1 .env
          
          echo "Running build..."
          npm run build
          
          echo "Build Timestamp: $(date)" > dist/VERSION.txt
          
          echo "Verifying secret injection in dist..."
          # Look for the start of the Supabase URL in any JS file in dist
          if grep -r "eviukbluwrwc" dist/assets/; then
            echo "✅ Supabase URL partial match found in built assets."
          else
            echo "❌ ERROR: Supabase URL NOT found in assets. Build might be using empty values."
            # Don't fail the build here yet, but log it clearly
          fi
          
          echo "Checking for 'void 0' in suspicious places..."
          grep -r "void 0" dist/assets/ | head -n 20 || true
        env:
          CI: false

      - name: ✅ Verify Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory was not created!"
            ls -R
            exit 1
          fi
          echo "Build contents:"
          ls -la dist/

      - name: 🔍 Debug Network & DNS
        run: |
          echo "Checking connectivity..."
          # Extract hostname from FTP_SERVER secret
          HOST=$(echo "${{ secrets.FTP_SERVER }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          echo "Target Host: $HOST"
          ping -c 3 $HOST || echo "Ping failed (common in CI, but worth noting)"
          nslookup $HOST || echo "DNS lookup failed!"

      # Step removed to prevent 550 errors on Hostinger FTP
      # - name: 🧹 Clean remote assets
      #   run: |
      #     # Use hostname extracted from secret
      #     HOST=$(echo "${{ secrets.FTP_SERVER }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
      #     lftp -c "set ftp:ssl-allow no; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} $HOST; cd public_html; rm -rf assets; rm index.html; rm VERSION.txt" || echo "Cleanup failed"

      - name: 📂 Sync files (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: public_html/
          protocol: ftp
          log-level: verbose
          timeout: 300000
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            .builds/**
