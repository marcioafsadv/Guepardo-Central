name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📦 Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 🔨 Install Dependencies
        run: |
          npm ci || npm install --force --legacy-peer-deps

      - name: 🏗️ Build Project
        run: |
          echo "Running type check..."
          npm run build
          echo "Build Timestamp: $(date)" > dist/VERSION.txt
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          CI: false

      - name: ✅ Verify Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory was not created!"
            ls -R
            exit 1
          fi
          echo "Build contents:"
          ls -la dist/

      - name: 🧹 Sanitize FTP Server
        id: sanitize
        run: |
          SERVER="${{ secrets.FTP_SERVER }}"
          SERVER="${SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%/}"
          echo "server=$SERVER" >> $GITHUB_OUTPUT

      - name: 🔍 Explore FTP Structure
        run: |
          sudo apt-get install -y lftp
          lftp -c "set ftp:ssl-allow no; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ steps.sanitize.outputs.server }}; ls -R" || echo "FTP listing failed"

      - name: 📂 Sync files (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.sanitize.outputs.server }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: test_deploy/
          protocol: ftp
          log-level: verbose
          timeout: 300000
